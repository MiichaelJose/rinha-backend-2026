services:
  postgres:
    image: postgres
    environment:
      POSTGRES_DB: app
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: 1234 
  redis:
    image: redis
  api1:
    build: .
    ports:
      - "3001:9999"
    
  api2:
    build: .
    ports:
      - "3002:9999"
  nginx:
    image: nginx:alpine
    ports:
      - "9999:80"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro